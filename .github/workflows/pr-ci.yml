name: PR CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-check:
    name: Code check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/backend/requirements-dev.txt

      - name: Install Python dev dependencies
        run: pip install -r apps/backend/requirements-dev.txt

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Python format check (Ruff)
        run: pnpm python:format:check

      - name: Python lint (Ruff)
        run: pnpm python:lint

      - name: Django system check
        working-directory: apps/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py check

      - name: Django migration files check
        working-directory: apps/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py makemigrations --check --dry-run

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        env:
          NEXT_PUBLIC_BACKEND_MAIN_API_URL: https://api.example.test
        run: pnpm lint

      - name: Dependency audit
        run: pnpm audit --audit-level=high

  workspace-tests:
    name: Workspace tests
    needs: code-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace tests
        run: pnpm test

  test:
    name: Backend tests
    needs: code-check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy test environment file
        run: cp infra/env/test/.env.example infra/env/test/.env

      - name: Run backend tests (Docker Compose)
        run: bash infra/scripts/test/test-all.sh

  build:
    name: Build
    needs: code-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_BACKEND_MAIN_API_URL: https://api.example.test
      NEXT_PUBLIC_BASE_PATH: ''
      NEXT_PUBLIC_THEME_MODE: system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production build (frontends)
        run: bash infra/scripts/build/build-frontends.sh

  docker-build:
    name: Build Docker image (${{ matrix.image_suffix }})
    needs: [workspace-tests, test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_suffix: backend
            dockerfile: infra/docker/backend/Dockerfile.prod
            needs_frontend_args: false
          - image_suffix: frontend-main
            dockerfile: infra/docker/frontend-main/Dockerfile.prod
            needs_frontend_args: true
          - image_suffix: frontend-admin
            dockerfile: infra/docker/frontend-admin/Dockerfile.prod
            needs_frontend_args: true
          - image_suffix: nginx
            dockerfile: infra/docker/nginx/Dockerfile
            needs_frontend_args: false
          - image_suffix: test-runner
            dockerfile: infra/docker/test-runner/Dockerfile
            needs_frontend_args: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image_suffix }} image (frontend)
        if: matrix.needs_frontend_args == true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: |
            NEXT_PUBLIC_BACKEND_MAIN_API_URL=https://api.example.test
            NEXT_PUBLIC_BASE_PATH=
            NEXT_PUBLIC_THEME_MODE=system
          cache-from: type=gha,scope=pr-ci-${{ matrix.image_suffix }}
          cache-to: type=gha,mode=max,scope=pr-ci-${{ matrix.image_suffix }}

      - name: Build ${{ matrix.image_suffix }} image
        if: matrix.needs_frontend_args != true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=pr-ci-${{ matrix.image_suffix }}
          cache-to: type=gha,mode=max,scope=pr-ci-${{ matrix.image_suffix }}
