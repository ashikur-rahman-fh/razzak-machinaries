name: Basic CI Test

on:
  push:
    branches: [master]

jobs:
  # Format, lint, typecheck, Vitest, Next production builds, audit — fast on the runner (no test DB).
  codebase-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/backend/requirements-dev.txt

      - name: Install Python dev dependencies
        run: pip install -r apps/backend/requirements-dev.txt

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Python format check (Ruff)
        run: pnpm python:format:check

      - name: Python lint (Ruff)
        run: pnpm python:lint

      - name: Django system check
        working-directory: apps/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py check

      - name: Django migration files check
        working-directory: apps/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py makemigrations --check --dry-run

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        env:
          NEXT_PUBLIC_BACKEND_MAIN_API_URL: https://api.example.test
        run: pnpm lint

      - name: Test (Vitest)
        run: pnpm test

      - name: Production build (frontend-main)
        env:
          NEXT_PUBLIC_BACKEND_MAIN_API_URL: https://api.example.test
        run: pnpm --filter @razzak-machinaries/frontend-main run build

      - name: Production build (frontend-admin)
        env:
          NEXT_PUBLIC_BACKEND_MAIN_API_URL: https://api.example.test
        run: pnpm --filter @razzak-machinaries/frontend-admin run build

      - name: Verify Next.js build artifacts
        run: |
          MAIN_BUILD_ID="apps/frontend-main/.next/BUILD_ID"
          if [[ ! -f "$MAIN_BUILD_ID" ]]; then
            echo "ERROR: Frontend build artifact not found at ${MAIN_BUILD_ID}. Run the frontend build locally and check the output directory." >&2
            exit 1
          fi
          ADMIN_BUILD_ID="apps/frontend-admin/.next/BUILD_ID"
          if [[ ! -f "$ADMIN_BUILD_ID" ]]; then
            echo "ERROR: Frontend build artifact not found at ${ADMIN_BUILD_ID}. Run the frontend build locally and check the output directory." >&2
            exit 1
          fi
          echo "frontend-main BUILD_ID=$(cat "$MAIN_BUILD_ID")"
          echo "frontend-admin BUILD_ID=$(cat "$ADMIN_BUILD_ID")"

      - name: Dependency audit
        run: pnpm audit --audit-level=high

  # Backend pytest only — needs Postgres/Redis from test compose (not run on host in CI).
  docker-tests:
    needs: codebase-quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy test environment file
        run: cp infra/env/test/.env.example infra/env/test/.env

      - name: Run backend tests (Docker Compose)
        run: bash infra/scripts/test/test-all.sh
