name: razzak-machinaries-debug

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./infra/env/dev/.env
    ports:
      - '5432:5432'
    volumes:
      - postgres_debug_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile.dev
    env_file:
      - ./infra/env/dev/.env
    volumes:
      - ./apps/backend:/app
    ports:
      - '8000:8000'
      - '5678:5678'
    command: ['/bin/bash', '/app/docker-entrypoint-debug.sh']
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-main:
    build:
      context: .
      dockerfile: infra/docker/frontend-main/Dockerfile.dev
    env_file:
      - ./infra/env/dev/.env
    environment:
      WATCHPACK_POLLING: 'true'
      NEXT_PUBLIC_BACKEND_MAIN_API_URL: http://localhost:8080
    volumes:
      - .:/workspace
    ports:
      - '3000:3000'
    depends_on:
      - backend

  frontend-admin:
    build:
      context: .
      dockerfile: infra/docker/frontend-admin/Dockerfile.dev
    env_file:
      - ./infra/env/dev/.env
    environment:
      WATCHPACK_POLLING: 'true'
      NEXT_PUBLIC_BACKEND_MAIN_API_URL: http://localhost:8080
    volumes:
      - .:/workspace
    ports:
      - '3001:3001'
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx/Dockerfile
    volumes:
      - ./infra/nginx/dev/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/dev/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy
      frontend-main:
        condition: service_started

volumes:
  postgres_debug_data:
