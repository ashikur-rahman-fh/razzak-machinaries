# Set COMPOSE_PROJECT_NAME in infra/env/prod/.env — do not change after first deploy (Docker volume names).
name: ${COMPOSE_PROJECT_NAME:-razzak-machinaries-prod}

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./infra/env/prod/.env
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    env_file:
      - ./infra/env/prod/.env
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile.prod
    env_file:
      - ./infra/env/prod/.env
    volumes:
      - backend_staticfiles:/app/staticfiles
    expose:
      - '8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend-main:
    build:
      context: .
      dockerfile: infra/docker/frontend-main/Dockerfile.prod
      args:
        NEXT_PUBLIC_BACKEND_MAIN_API_URL: ${NEXT_PUBLIC_BACKEND_MAIN_API_URL:?NEXT_PUBLIC_BACKEND_MAIN_API_URL is required}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_THEME_MODE: ${NEXT_PUBLIC_THEME_MODE:-system}
    env_file:
      - ./infra/env/prod/.env
    expose:
      - '3000'
    depends_on:
      - backend
    restart: unless-stopped

  frontend-admin:
    build:
      context: .
      dockerfile: infra/docker/frontend-admin/Dockerfile.prod
      args:
        NEXT_PUBLIC_BACKEND_MAIN_API_URL: ${NEXT_PUBLIC_BACKEND_MAIN_API_URL:?NEXT_PUBLIC_BACKEND_MAIN_API_URL is required}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_THEME_MODE: ${NEXT_PUBLIC_THEME_MODE:-system}
    env_file:
      - ./infra/env/prod/.env
    expose:
      - '3000'
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx/Dockerfile
    volumes:
      - ./infra/nginx/prod/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/prod/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
      - ./infra/nginx/prod/certs:/etc/nginx/certs:ro
    ports:
      - '443:443'
      - '80:80'
    depends_on:
      - backend
      - frontend-main
      - frontend-admin
    restart: unless-stopped

volumes:
  postgres_prod_data:
  backend_staticfiles:
