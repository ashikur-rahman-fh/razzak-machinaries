# Restore client IP when traffic passes through Cloudflare before this Nginx.
# Requires firewall rules so only Cloudflare can reach :443 on the VM; otherwise
# CF-Connecting-IP can be spoofed on direct connections.
real_ip_header CF-Connecting-IP;
real_ip_recursive on;
include /etc/nginx/snippets/cloudflare-ips.conf;
