[tool.basedpyright]
include = ["."]
exclude = [".venv", "**/__pycache__", ".pytest_cache", "staticfiles"]
venvPath = "."
venv = ".venv"
extraPaths = ["."]
pythonVersion = "3.12"

[tool.pyright]
include = ["."]
exclude = [".venv", "**/__pycache__", ".pytest_cache", "staticfiles"]
venvPath = "."
venv = ".venv"
extraPaths = ["."]
pythonVersion = "3.12"

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["."]
exclude = [".venv", "__pycache__", ".pytest_cache", "staticfiles", "**/migrations/**"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
